# cargo-deny configuration -- https://embarkstudios.github.io/cargo-deny/
# Validated against cargo-deny 0.18+/0.19 (2026). Run: `cargo deny check`.
# The legacy license keys (copyleft/default/unlicensed/allow-osi-fsf-free) and
# advisory keys (vulnerability/notice/severity-threshold/version) were REMOVED
# and now hard-error. Everything is denied by default; opt in via allow/ignore.

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[output]
feature-depth = 1

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
maximum-db-staleness = "P14D"
yanked = "deny"
unmaintained = "workspace"
ignore = [
    # quick-xml XML-parsing DoS advisories. quick-xml is a transitive dep reached
    # ONLY via polars -> object_store, which uses it to parse cloud-storage API
    # (S3/Azure) XML responses. This engine reads local Parquet only; it never
    # makes cloud calls or parses untrusted XML, so the vulnerable paths are
    # unreachable. Both are DoS-class (no memory-safety/RCE). No semver-compatible
    # patched quick-xml exists for the pinned polars 0.54.4 / object_store 0.13.2;
    # remove these once polars/object_store ship a patched quick-xml.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml quadratic-runtime DoS; unreachable (no cloud/untrusted-XML path); no compatible patch under polars 0.54.4" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml namespace-alloc DoS; unreachable (no cloud/untrusted-XML path); no compatible patch under polars 0.54.4" },
]

[licenses]
confidence-threshold = 0.93
# Allow-list only (SPDX). Covers the typical Polars + Arrow + Apache-2.0 tree.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]
exceptions = [
    # { allow = ["OpenSSL"], crate = "ring" },
]

# Skip license checks for our own unpublished workspace crates.
[licenses.private]
ignore = true

[bans]
# Polars pulls a wide tree; duplicate versions are common -> warn, don't fail.
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true   # intra-workspace path deps may use `*`
deny = [
    # { crate = "openssl", reason = "prefer rustls" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
