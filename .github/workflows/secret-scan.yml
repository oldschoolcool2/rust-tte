name: secret-scan

# Secret-leakage gate (ported from ~/projects/power). The OSS gitleaks CLI is
# downloaded at a pinned version and checksum-verified, then run over the full
# git history. A finding fails the job (gitleaks exits non-zero). The ruleset is
# .gitleaks.toml at the repo root.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: only needs to read the checkout.
permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    env:
      # Bump VERSION and SHA256 together. Checksums are published at
      # https://github.com/gitleaks/gitleaks/releases (gitleaks_<v>_checksums.txt).
      # Keep VERSION in lockstep with the gitleaks rev in .pre-commit-config.yaml.
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so `gitleaks git` scans every commit
          persist-credentials: false
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          curl -fsSL --retry 3 -o "${tarball}" "${url}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "${tarball}" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan repository history for secrets
        run: gitleaks git . --redact --verbose
