name: R binding (tters)

# Builds and tests the `tters` extendr binding: R CMD INSTALL (release) + the
# testthat round-trip that reproduces the fixture battery through R.
#
# This job is intentionally PATH-FILTERED and also available via manual dispatch:
# the release build compiles Polars with LTO (~15-20 min), so it should not run
# on unrelated changes.
#
# Pinning note: `uses:` here are TAG-pinned (e.g. @v5) to match the repo's other
# workflows and its deliberate "tag pins + Dependabot" policy. (This differs from
# the SHA-pinning in .claude/rules/security.md; the repo-wide convention wins —
# Dependabot tracks the GitHub Actions ecosystem.)

on:
  push:
    branches: [main]
    paths:
      - "bindings/tters/**"
      - "crates/tte-expand/**"
      - ".github/workflows/r-binding.yml"
  pull_request:
    paths:
      - "bindings/tters/**"
      - "crates/tte-expand/**"
      - ".github/workflows/r-binding.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: only needs to read the repository.
permissions:
  contents: read

jobs:
  # The binding crate is a DETACHED cargo workspace (bindings/tters/src/rust
  # has its own [workspace] + [lints] tables), so the repo-root ci.yml
  # fmt/clippy jobs never see it. This job is its lint wall. Dev-profile (no
  # LTO), so it is much faster than the release install below.
  lint:
    name: fmt + clippy (binding workspace)
    runs-on: ubuntu-latest
    env:
      # No debug info: a debug-info Polars build can exhaust the runner disk.
      CARGO_PROFILE_DEV_DEBUG: 0
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # rust-toolchain.toml pins 1.95.0 + rustfmt/clippy components; @stable
      # just provides rustup.
      - uses: dtolnay/rust-toolchain@stable

      # The extendr -> libR-sys build script needs an R installation (libR
      # headers) even for a check-profile clippy build.
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/tters/src/rust

      - name: cargo fmt --check
        working-directory: bindings/tters/src/rust
        run: cargo fmt --check

      - name: cargo clippy -D warnings
        working-directory: bindings/tters/src/rust
        run: cargo clippy --all-targets --locked -- -D warnings

  install-and-test:
    name: R CMD INSTALL + testthat round-trip
    runs-on: ubuntu-latest
    env:
      # Point the round-trip test at the immutable in-repo fixture battery.
      TTERS_FIXTURE_DIR: ${{ github.workspace }}/fixtures
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # rust-toolchain.toml pins 1.95.0; rustup auto-installs it when cargo runs
      # in the (detached) binding workspace, so @stable just provides rustup.
      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Runtime deps for the round-trip self-test (binaries via RSPM).
      - name: Install R test dependencies
        run: Rscript -e 'install.packages(c("testthat", "arrow"))'

      - name: R CMD INSTALL tters (release)
        run: R CMD INSTALL bindings/tters

      - name: testthat round-trip (full fixture battery through R)
        run: |
          Rscript -e '
            library(tters)
            testthat::test_dir(
              "bindings/tters/tests/testthat",
              stop_on_failure = TRUE,
              reporter = "summary"
            )
          '

  standalone-install:
    name: Standalone (monorepo-absent) install + self-test
    runs-on: ubuntu-latest
    # Proves the offline distribution path: a self-contained source tarball
    # (core crate + every Cargo dep vendored) installs with the monorepo
    # unreachable and runs its testthat battery against the vendored
    # inst/extdata subset (not skip()). CARGO_PROFILE_*_DEBUG=0 keeps the
    # vendored-Polars build within the runner's disk budget.
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_RELEASE_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      # Full history so build-offline-tarball.sh can `git clone --bare` the
      # workspace and cargo can vendor the git-pinned core at HEAD.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # arrow pulls bit64 (a hard Imports), so tters' Imports are satisfied.
      - name: Install R test dependencies
        run: Rscript -e 'install.packages(c("testthat", "arrow"))'

      # Synthesize the git-dep form + cargo-vendor the whole tree into a
      # self-contained tarball (the committed working tree keeps its path dep).
      - name: Build self-contained tarball (vendored core + crates.io deps)
        run: sh bindings/tters/tools/build-offline-tarball.sh "" "${{ runner.temp }}"

      # Install OFFLINE in an isolated library: the unpacked tarball lives under
      # runner.temp, so the relative '../../../../crates/tte-expand' path resolves
      # to nothing -- the build must succeed purely from the vendored sources.
      - name: R CMD INSTALL the tarball offline (monorepo unreachable)
        working-directory: ${{ runner.temp }}
        run: |
          mkdir -p lib
          CARGO_NET_OFFLINE=true DEBUG=true R CMD INSTALL --library=lib tters_*.tar.gz

      # Run the battery from runner.temp (repo-root fixtures/ unreachable), so the
      # resolver falls to system.file("extdata") -- the vendored subset, not skip().
      - name: testthat self-test against inst/extdata
        working-directory: ${{ runner.temp }}
        run: |
          tar xzf tters_*.tar.gz
          # Prepend the tters-only library to the DEFAULT paths (which hold
          # testthat/arrow); do NOT override R_LIBS_USER, or those go missing.
          Rscript -e '
            .libPaths(c(file.path(Sys.getenv("RUNNER_TEMP"), "lib"), .libPaths()))
            library(testthat); library(tters)
            Sys.unsetenv("TTERS_FIXTURE_DIR")
            ex <- system.file("extdata", package = "tters")
            stopifnot(nzchar(ex), length(list.files(ex, recursive = TRUE, pattern = "[.]parquet$")) > 0)
            message("self-test fixtures: ", ex)
            testthat::test_dir("tters/tests/testthat", stop_on_failure = TRUE, reporter = "summary")
          '

  te-datastore-parity:
    name: te_datastore parity vs TrialEmulation
    runs-on: ubuntu-latest
    # The te_datastore parity suite skips unless TrialEmulation is installed, and
    # the round-trip job above does not install it -- so those assertions never
    # run there. This job installs the pinned upstream and executes the parity
    # suite, giving the "expand in Rust, present through te_datastore" claim
    # continuous regression cover (the mapping reads private upstream S4
    # internals, so an upstream or binding change could otherwise break it
    # silently). Debug install: correctness, not performance.
    env:
      # No debug info: a debug-info Polars build can exhaust the runner disk.
      CARGO_PROFILE_DEV_DEBUG: 0
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # data.table + arrow (arrow pulls bit64, a hard Imports); remotes to pin the
      # exact upstream the parity was validated against.
      - name: Install R dependencies
        run: Rscript -e 'install.packages(c("testthat", "arrow", "data.table", "remotes"))'

      # Pin the EXACT version parity was validated against (Suggests allows newer,
      # but the guard holds the Oracle fixed while OUR code changes).
      - name: Install TrialEmulation (pinned v0.0.4.11)
        # Authenticate the GitHub API read: the bundled remotes PAT is
        # rate-limited and fails on shared runners. Passed via env: (never
        # interpolated into the run: block) per the template-injection guard.
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: Rscript -e 'remotes::install_github("Causal-LDA/TrialEmulation@v0.0.4.11", upgrade = "never")'

      - name: R CMD INSTALL tters (debug)
        run: DEBUG=true R CMD INSTALL bindings/tters

      - name: testthat te_datastore parity suite
        # Attach TrialEmulation + data.table so their S4 generics (e.g.
        # read_expanded_data) resolve for the suite's bare calls -- the natural
        # usage context for a te_datastore backend (tters registers methods on
        # TrialEmulation's generics; the generics must be in scope to dispatch).
        run: |
          Rscript -e '
            library(tters)
            library(TrialEmulation)
            library(data.table)
            testthat::test_dir(
              "bindings/tters/tests/testthat",
              filter = "te-datastore-tters",
              stop_on_failure = TRUE,
              reporter = "summary"
            )
          '

  r-cmd-check:
    name: R CMD check (--as-cran)
    runs-on: ubuntu-latest
    # Runs `R CMD check --as-cran` on the DISTRIBUTABLE tarball (self-contained:
    # vendored core + crates.io deps) -- the same artifact `standalone-install`
    # builds. A plain `rcmdcheck(path=...)` cannot work: `R CMD build` tarballs only
    # files under bindings/tters/, so the committed `path` dep on the core crate
    # escapes the tarball and install fails. Checking the vendored tarball is also
    # the faithful, CRAN-shaped gate (docs, examples, vignette, NAMESPACE), mirroring
    # what r-universe runs. `--as-cran` forces Suggests, so they are all installed.
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_RELEASE_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
      # Skip the remote CRAN-incoming probe (network flake / irrelevant off-CRAN).
      _R_CHECK_CRAN_INCOMING_REMOTE_: false
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so build-offline-tarball.sh can `git clone --bare` the
          # workspace and vendor the git-pinned core at HEAD.
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: >
          Rscript -e 'install.packages(c("rcmdcheck", "testthat", "arrow",
          "data.table", "knitr", "rmarkdown", "remotes"))'

      # `--as-cran` forces Suggests to be installed; pin the exact upstream the
      # binding targets. PAT passed via env: (never interpolated) per the guard.
      - name: Install TrialEmulation (pinned v0.0.4.11)
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: >
          Rscript -e 'remotes::install_github("Causal-LDA/TrialEmulation@v0.0.4.11",
          upgrade = "never")'

      - name: Build self-contained tarball (vendored core + crates.io deps)
        run: sh bindings/tters/tools/build-offline-tarball.sh "" "${{ runner.temp }}"

      - name: R CMD check --as-cran (offline, on the distributable tarball)
        working-directory: ${{ runner.temp }}
        env:
          # Build the vendored core offline; debug profile keeps it within the
          # runner's disk + time budget (correctness gate, not a perf build).
          CARGO_NET_OFFLINE: true
          DEBUG: true
        run: |
          Rscript -e '
            tb <- list.files(Sys.getenv("RUNNER_TEMP"),
                             pattern = "^tters_.*\\.tar\\.gz$", full.names = TRUE)[1]
            stopifnot(!is.na(tb), nzchar(tb), file.exists(tb))
            rcmdcheck::rcmdcheck(
              tb,
              args = c("--no-manual", "--as-cran"),
              error_on = "warning",
              check_dir = file.path(Sys.getenv("RUNNER_TEMP"), "check")
            )
          '
