name: R binding (tters)

# Builds and tests the `tters` extendr binding: R CMD INSTALL (release) + the
# testthat round-trip that reproduces the fixture battery through R.
#
# This job is intentionally PATH-FILTERED and also available via manual dispatch:
# the release build compiles Polars with LTO (~15-20 min), so it should not run
# on unrelated changes.
#
# Pinning note: `uses:` here are TAG-pinned (e.g. @v5) to match the repo's other
# workflows and its deliberate "tag pins + Dependabot" policy. (This differs from
# the SHA-pinning in .claude/rules/security.md; the repo-wide convention wins —
# Dependabot tracks the GitHub Actions ecosystem.)

on:
  push:
    branches: [main]
    paths:
      - "bindings/tters/**"
      - "crates/tte-expand/**"
      - ".github/workflows/r-binding.yml"
  pull_request:
    paths:
      - "bindings/tters/**"
      - "crates/tte-expand/**"
      - ".github/workflows/r-binding.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: only needs to read the repository.
permissions:
  contents: read

jobs:
  install-and-test:
    name: R CMD INSTALL + testthat round-trip
    runs-on: ubuntu-latest
    env:
      # Point the round-trip test at the immutable in-repo fixture battery.
      TTERS_FIXTURE_DIR: ${{ github.workspace }}/fixtures
    steps:
      - uses: actions/checkout@v5

      # rust-toolchain.toml pins 1.95.0; rustup auto-installs it when cargo runs
      # in the (detached) binding workspace, so @stable just provides rustup.
      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Runtime deps for the round-trip self-test (binaries via RSPM).
      - name: Install R test dependencies
        run: Rscript -e 'install.packages(c("testthat", "arrow"))'

      - name: R CMD INSTALL tters (release)
        run: R CMD INSTALL bindings/tters

      - name: testthat round-trip (full fixture battery through R)
        run: |
          Rscript -e '
            library(tters)
            testthat::test_dir(
              "bindings/tters/tests/testthat",
              stop_on_failure = TRUE,
              reporter = "summary"
            )
          '

  standalone-install:
    name: Standalone (monorepo-absent) install + self-test
    runs-on: ubuntu-latest
    # Proves the Phase-10 distribution path: a self-contained source tarball
    # (core crate + every Cargo dep vendored) installs with the monorepo
    # unreachable and runs its testthat battery against the vendored
    # inst/extdata subset (not skip()). CARGO_PROFILE_*_DEBUG=0 keeps the
    # vendored-Polars build within the runner's disk budget.
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_RELEASE_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      # Full history so build-offline-tarball.sh can `git clone --bare` the
      # workspace and cargo can vendor the git-pinned core at HEAD.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # arrow pulls bit64 (a hard Imports), so tters' Imports are satisfied.
      - name: Install R test dependencies
        run: Rscript -e 'install.packages(c("testthat", "arrow"))'

      # Synthesize the git-dep form + cargo-vendor the whole tree into a
      # self-contained tarball (the committed working tree keeps its path dep).
      - name: Build self-contained tarball (vendored core + crates.io deps)
        run: sh bindings/tters/tools/build-offline-tarball.sh "" "${{ runner.temp }}"

      # Install OFFLINE in an isolated library: the unpacked tarball lives under
      # runner.temp, so the relative '../../../../crates/tte-expand' path resolves
      # to nothing -- the build must succeed purely from the vendored sources.
      - name: R CMD INSTALL the tarball offline (monorepo unreachable)
        working-directory: ${{ runner.temp }}
        run: |
          mkdir -p lib
          CARGO_NET_OFFLINE=true DEBUG=true R CMD INSTALL --library=lib tters_*.tar.gz

      # Run the battery from runner.temp (repo-root fixtures/ unreachable), so the
      # resolver falls to system.file("extdata") -- the vendored subset, not skip().
      - name: testthat self-test against inst/extdata
        working-directory: ${{ runner.temp }}
        run: |
          tar xzf tters_*.tar.gz
          R_LIBS_USER="${{ runner.temp }}/lib" Rscript -e '
            .libPaths(c(file.path(Sys.getenv("RUNNER_TEMP"), "lib"), .libPaths()))
            library(testthat); library(tters)
            Sys.unsetenv("TTERS_FIXTURE_DIR")
            ex <- system.file("extdata", package = "tters")
            stopifnot(nzchar(ex), length(list.files(ex, recursive = TRUE, pattern = "[.]parquet$")) > 0)
            message("self-test fixtures: ", ex)
            testthat::test_dir("tters/tests/testthat", stop_on_failure = TRUE, reporter = "summary")
          '
