name: extdata drift-guard

# The installed/standalone self-test runs against a vendored subset of the
# immutable Oracle battery under bindings/tters/inst/extdata (regenerated by
# tools/vendor-extdata.R from the repo-root fixtures/). The core Rust source is
# single-sourced, but that vendored DATA is a plain copy: if fixtures/ changes
# and the subset is not re-vendored, the standalone self-test would keep passing
# against stale expected values. This job re-runs the vendor script and fails on
# any diff, so the vendored ground truth can never silently drift.
#
# Pinning note: `uses:` are TAG-pinned to match the repo's deliberate
# "tag pins + Dependabot" policy.

on:
  push:
    branches: [main]
    paths:
      - "fixtures/**"
      - "bindings/tters/inst/extdata/**"
      - "bindings/tters/tools/vendor-extdata.R"
      - ".github/workflows/extdata-drift.yml"
  pull_request:
    paths:
      - "fixtures/**"
      - "bindings/tters/inst/extdata/**"
      - "bindings/tters/tools/vendor-extdata.R"
      - ".github/workflows/extdata-drift.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: only needs to read the repository.
permissions:
  contents: read

jobs:
  drift:
    name: vendored inst/extdata matches fixtures/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Base R is enough: the vendor script only uses file.copy / unlink.
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Re-vendor the inst/extdata subset from fixtures/
        run: Rscript bindings/tters/tools/vendor-extdata.R

      - name: Fail if the vendored subset drifted from fixtures/
        run: |
          git add -A -- bindings/tters/inst/extdata
          if ! git diff --cached --quiet -- bindings/tters/inst/extdata; then
            echo "::error::bindings/tters/inst/extdata is out of sync with fixtures/. Run 'Rscript bindings/tters/tools/vendor-extdata.R' and commit the result."
            git diff --cached --stat -- bindings/tters/inst/extdata
            exit 1
          fi
