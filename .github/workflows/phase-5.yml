name: Phase 5 (certificate + bench smoke)

# Computational-reproducibility certificate + a fast benchmark smoke.
#   * `make verify` runs the contract suite, which regenerates and re-verifies
#     report/certificate.md — recomputing every fixture SHA-256 against the
#     manifests (differential integrity: the job FAILS on any fixture drift) and
#     re-checking equivalence. Pure cargo, no R.
#   * `make bench-smoke` runs the criterion engine benchmark at input rows <= 1e5
#     (`--quick`) so a perf regression or a broken bench is caught cheaply.
# The heavy R-vs-Rust curves (`make curves`) and the Tier-2 golden (`make golden`)
# stay manual — they need R + TrialEmulation and can drive R into its OOM regime.
#
# Pinning: `uses:` are TAG-pinned (e.g. @v5) to match the repo's other workflows
# and its deliberate "tag pins + Dependabot" policy (see .github/workflows/r-binding.yml).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: only needs to read the repository.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  # Strip debug info from the dev/test/bench artifacts. The dependency tree is
  # large (Polars + the object_store TLS stack + smartcore + criterion); with full
  # debuginfo, `make verify` (--all-targets) + `make bench-smoke` can exhaust the
  # runner disk ("No space left on device" while compiling the bench). debug=0
  # keeps the footprint well under the limit; `debug-assertions` are unaffected, so
  # the certificate's equivalence proof is unchanged.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_PROFILE_BENCH_DEBUG: "0"

jobs:
  certificate:
    name: reproducibility certificate + bench smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # rust-toolchain.toml pins 1.95.0; rustup auto-installs it when cargo runs,
      # so @stable just provides rustup.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Equivalence proof + differential fixture-integrity certificate. Fails the
      # job on any fixture SHA-256 drift or equivalence mismatch.
      - name: make verify (certificate)
        run: make verify

      # Fast benchmark smoke (input rows <= 1e5, criterion --quick).
      - name: make bench-smoke
        run: make bench-smoke

      # Publish the generated certificate as a build artifact.
      - name: upload certificate
        uses: actions/upload-artifact@v7
        with:
          name: reproducibility-certificate
          path: report/certificate.md
