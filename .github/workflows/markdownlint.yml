name: markdownlint

# Markdown lint CI (rules ported from ~/projects/power's .markdownlint.yaml).
# ubuntu-latest ships Node.js, so the pinned markdownlint-cli2 runs via npx — no
# extra action to pin. Rules: .markdownlint.yaml   Globs/ignores: .markdownlint-cli2.yaml
on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.yaml"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/markdownlint.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.yaml"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/markdownlint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      # Pin the CLI version here; keep it in sync with the markdownlint-cli2 rev
      # in .pre-commit-config.yaml.
      - run: npx --yes markdownlint-cli2@0.22.1 "**/*.md"
