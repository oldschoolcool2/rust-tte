name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR (saves CI minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0        # smaller, more cacheable CI builds
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"    # deny warnings in every compiled job
  RUSTDOCFLAGS: "-D warnings" # ...and in doctests / rustdoc

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    # rust-toolchain.toml pins 1.95.0, and rustup honors that file ABOVE the
    # toolchain the action selects. Force the matrix toolchain via RUSTUP_TOOLCHAIN
    # (env beats the toolchain file in rustup's precedence) so this job genuinely
    # tests stable AND beta instead of silently running 1.95.0 for both.
    env:
      RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}
      # Strip debug info from the test/bench link. The dependency tree is large
      # (Polars + the object_store TLS stack + smartcore + criterion); with full
      # debuginfo, linking the `--all-targets` binaries can exhaust the runner and
      # crash the *beta* bundled `rust-lld` with a SIGBUS (an upstream linker bug —
      # the identical binaries link fine on 1.95.0/stable). debug=0 keeps the link
      # well under that threshold; `debug-assertions` (and thus test behaviour) are
      # unaffected, so the matrix still genuinely tests stable AND beta.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_PROFILE_BENCH_DEBUG: "0"
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      # --all-targets does NOT run doctests, so run them in a second pass.
      - run: cargo test --workspace --all-features --all-targets --locked
      - run: cargo test --workspace --all-features --doc --locked

  check:
    name: check (all targets / all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --all-features --locked

  # NOTE: there is intentionally no separate low-MSRV job. Polars 0.54.4 requires
  # the latest stable — it uses `cold_path` / `atomic_try_update` (stabilized in
  # 1.95.0) — so MSRV == the pinned toolchain (rust-toolchain.toml = 1.95.0). The
  # fmt/clippy/check/test jobs already run on 1.95.0 via the toolchain file, which
  # verifies the MSRV. Keep `rust-version` in Cargo.toml aligned with that pin.

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny --all-features check

  # Reproducibility certificate + fast benchmark smoke (absorbed from the
  # retired standalone workflow, whose `make verify` re-ran the full contract
  # suite the test matrix above already runs — `cargo test --all-targets` even
  # executes the certificate bench in test mode). This job keeps the unique
  # parts: the explicit certificate regeneration on the PINNED toolchain
  # (rust-toolchain.toml; the `stable` matrix row can drift ahead of the pin
  # between releases), the criterion smoke, and the published artifact. The
  # heavy R-vs-Rust curves (`make curves`) and Tier-2 golden (`make golden`)
  # stay manual — they need R + TrialEmulation.
  certificate:
    name: reproducibility certificate + bench smoke
    runs-on: ubuntu-latest
    env:
      # Strip debug info: with full debuginfo, linking the bench binaries can
      # exhaust the runner disk (same guard as the test matrix above).
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_PROFILE_BENCH_DEBUG: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # rust-toolchain.toml pins 1.95.0; rustup auto-installs it when cargo
      # runs, so @stable just provides rustup.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Differential fixture integrity + equivalence spot-checks: fails on any
      # fixture SHA-256 drift or equivalence mismatch, and regenerates
      # report/certificate.md.
      - name: make certificate
        run: make certificate

      # Fast benchmark smoke (input rows <= 1e5, criterion --quick).
      - name: make bench-smoke
        run: make bench-smoke

      # Publish the generated certificate as a build artifact.
      - name: upload certificate
        uses: actions/upload-artifact@v7
        with:
          name: reproducibility-certificate
          path: report/certificate.md
